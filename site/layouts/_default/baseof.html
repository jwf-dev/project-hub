<!doctype html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Custom overrides (Shock-inspired) -->
  <link rel="stylesheet" href="{{ "css/custom.css" | relURL }}">

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:card" content="summary">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark shock-navbar">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link{{ if .IsHome }} active{{ end }}" href="{{ "/" | relURL }}">Home</a></li>
            <li class="nav-item"><a class="nav-link{{ if eq .Section "Projects" }} active{{ end }}" href="{{ "/projects/" | relURL }}">Projects</a></li>
            <li class="nav-item"><a class="nav-link{{ if eq .Section "Notes" }} active{{ end }}" href="{{ "/notes/" | relURL }}">Notes</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="border-top py-4 mt-auto">
    <div class="container small text-muted d-flex flex-column flex-md-row justify-content-between gap-2">
      <div>&copy; {{ now.Year }} {{ .Site.Title }}</div>
      <div>
        Built with <a class="link-secondary" href="https://gohugo.io">Hugo</a>
        {{ with .Site.Params.socialIcons }}
          <span class="mx-2">·</span>
          {{ range $i, $s := . }}
            {{ if $i }}<span class="mx-1">·</span>{{ end }}
            <a class="link-secondary" href="{{ $s.url }}">{{ $s.name }}</a>
          {{ end }}
        {{ end }}
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
