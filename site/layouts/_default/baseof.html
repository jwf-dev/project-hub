<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; color: #333; }
      header { background: #2c3e50; color: white; padding: 2rem; }
      header h1 { font-size: 2rem; }
      nav { margin-top: 1rem; }
      nav a { color: white; margin-right: 1.5rem; text-decoration: none; }
      nav a:hover { text-decoration: underline; }
      main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
      h2 { margin-top: 2rem; margin-bottom: 1rem; color: #2c3e50; }
      h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; color: #34495e; }
      a { color: #3498db; text-decoration: none; }
      a:hover { text-decoration: underline; }
      ul, ol { margin-left: 2rem; margin-bottom: 1rem; }
      li { margin-bottom: 0.5rem; }
      .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 0.25rem; font-size: 0.85rem; font-weight: bold; }
      .status-idea { background: #ecf0f1; color: #7f8c8d; }
      .status-active { background: #3498db; color: white; }
      .status-done { background: #2ecc71; color: white; }
      .date { color: #7f8c8d; font-size: 0.9rem; }
      .tags { margin-top: 0.5rem; }
      .tag { display: inline-block; background: #ecf0f1; color: #2c3e50; padding: 0.25rem 0.5rem; margin-right: 0.5rem; border-radius: 0.25rem; font-size: 0.85rem; }
      footer { background: #34495e; color: white; padding: 1rem; text-align: center; margin-top: 3rem; }
    </style>
    {{ range .AlternativeOutputFormats -}}
      {{ printf `<link rel="%s" type="%s" href="%s" title="%s" />` .Rel .MediaType.Type .Permalink $.Site.Title | safeHTML }}
    {{- end }}
  </head>
  <body>
    <header>
      <h1>{{ .Site.Title }}</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/projects/">Projects</a>
        <a href="/notes/">Notes</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer>
      <p>&copy; 2026 Project Hub. Built with Hugo.</p>
    </footer>
  </body>
</html>
