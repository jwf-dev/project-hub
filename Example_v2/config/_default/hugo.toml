baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'My New Hugo Site'
theme = 'shock'


[module]
    # Version
  [module.hugoVersion]
    extended = true
    min = '0.120.0' # If changed, update theme.toml

  # Bootstrap
  [[module.imports]]
    path = 'github.com/twbs/bootstrap'
  [[module.imports.mounts]]
    source = 'scss/'
    target = 'assets/scss/bootstrap/'
  [[module.imports.mounts]]
    source = 'dist/js/'
    target = 'assets/js/bootstrap/'
  # Bootstrap RFS
  [[module.imports]]
    path = 'github.com/twbs/rfs'
  [[module.imports.mounts]]
    source = 'scss.scss'
    target = 'assets/scss/bootstrap/vendor/_rfs.scss'

  # Lucide Icons
  [[module.imports]]
    path = 'github.com/lucide-icons/lucide'
  [[module.imports.mounts]]
    source = 'icons/'
    target = 'assets/icons/lucide/'
  # Simple Icons
  [[module.imports]]
    path = 'github.com/simple-icons/simple-icons'
  [[module.imports.mounts]]
    source = 'icons/'
    target = 'assets/icons/simple/'
  # Custom Icons

# Privacy
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = true
    respectDoNotTrack = true
    useSessionStorage = true
  [privacy.instagram]
    disable = true
    simple = true
  [privacy.x]
    disable = true
    enableDNT = true
    simple = true
  [privacy.vimeo]
    disable = true
    enableDNT = true
    simple = true
  [privacy.youtube]
    disable = true
    privacyEnhanced = true

# Services
[services]
  [services.instagram]
    disableInlineCSS = true
  [services.x]
    disableInlineCSS = true

[markup.goldmark.renderer]
unsafe = true
